name: Python CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements-ci.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt

      - name: Check formatting (black)
        run: |
          black --check train_scripts/initialize_models_utils.py tools/pretrained_verify/cached_inference_features.py tools/pretrained_verify/visualize_pretrained_inference.py tests/test_cached_inference_features.py tests/test_initialize_models_utils.py tests/test_visualize_pretrained_inference.py

      - name: Lint (pylint)
        run: |
          export PYTHONPATH="${PYTHONPATH}:."
          pylint --rcfile=.pylintrc train_scripts/initialize_models_utils.py tools/pretrained_verify/cached_inference_features.py tools/pretrained_verify/visualize_pretrained_inference.py tests/test_cached_inference_features.py tests/test_initialize_models_utils.py tests/test_visualize_pretrained_inference.py

      - name: Run tests with coverage
        run: |
          pytest tests/test_cached_inference_features.py tests/test_initialize_models_utils.py tests/test_visualize_pretrained_inference.py \
            --cov=train_scripts.initialize_models_utils \
            --cov=tools.pretrained_verify.cached_inference_features \
            --cov=tools.pretrained_verify.visualize_pretrained_inference \
            --cov-config=.coveragerc --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=90

      - name: Check formatting (black) — expanded files
        run: |
          black --check \
            train_scripts/exp_config_utils.py \
            tools/stage3/common.py \
            tools/stage3/ablation_vis_utils.py \
            tests/test_stage3_common.py \
            tests/test_exp_config_utils.py \
            tests/test_stage3_ablation_vis_utils.py

      - name: Lint (pylint) — expanded files
        run: |
          export PYTHONPATH="${PYTHONPATH}:."
          pylint --rcfile=.pylintrc \
            train_scripts/exp_config_utils.py \
            tools/stage3/common.py \
            tools/stage3/ablation_vis_utils.py \
            tests/test_stage3_common.py \
            tests/test_exp_config_utils.py \
            tests/test_stage3_ablation_vis_utils.py

      - name: Run expanded tests with coverage
        run: |
          export PYTHONPATH="${PYTHONPATH}:."
          pytest tests/test_exp_config_utils.py tests/test_stage3_common.py tests/test_stage3_ablation_vis_utils.py \
            --cov=train_scripts.exp_config_utils \
            --cov=tools.stage3.common \
            --cov=tools.stage3.ablation_vis_utils \
            --cov-config=.coveragerc --cov-report=term-missing \
            --cov-fail-under=70

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
