name: Python CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install black pylint pytest pytest-cov numpy pillow matplotlib opencv-python-headless

      - name: Check formatting (black)
        run: |
          black --check tools/cached_inference_features.py tools/visualize_pretrained_inference.py tests/test_cached_inference_features.py tests/test_visualize_pretrained_inference.py

      - name: Lint (pylint)
        run: |
          export PYTHONPATH="${PYTHONPATH}:."
          pylint --rcfile=.pylintrc tools/cached_inference_features.py tools/visualize_pretrained_inference.py tests/test_cached_inference_features.py tests/test_visualize_pretrained_inference.py

      - name: Run tests with coverage
        run: |
          pytest tests/test_cached_inference_features.py tests/test_visualize_pretrained_inference.py \
            --cov=tools --cov-config=.coveragerc --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=90

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
